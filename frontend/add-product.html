<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Add New Product. Manage products, stock levels, and operations." />
  <title>Add Product – Inventory Management</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">📦</div>
    <h1>Inventory</h1>
    <p>Management System</p>
  </div>

  <span class="sidebar-section-label">System</span>
  <a href="home.html" class="nav-item" style="color: var(--text-muted); font-size: 18px; font-weight: bold;">
    <span class="nav-icon">←</span> Back to Main
  </a>

  <span class="sidebar-section-label">Inventory Management</span>
  <a id="nav-inventory" href="inventory.html" class="nav-item">
    <span class="nav-icon">📦</span> Dashboard
  </a>
  <a id="nav-add-product" href="add-product.html" class="nav-item active">
    <span class="nav-icon">➕</span> Add Product
  </a>
</aside>

<div class="main-wrapper">
  <header class="topbar">
    <div class="topbar-left">
      <h2>Add New Product</h2>
      <p id="current-date">Loading date...</p>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" onclick="toggleTheme()">🌙</button>
      <div class="avatar" title="Admin" onclick="window.location.href='profile.html'" style="cursor: pointer;">AD</div>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <h1>Add New Product</h1>
      <p>Enter the details of the new product to add it to your inventory.</p>
    </div>

    <!-- Add Product Form -->
    <div class="card" style="max-width: 600px; margin: 0 auto;">
      <div class="card-header">
        <h3><span class="card-icon">➕</span> Product Details</h3>
      </div>
      <div class="card-body">
        <form id="add-product-form">
          <div class="form-group" style="margin-bottom:15px;">
            <label for="product-name">Product Name</label>
            <input type="text" id="product-name" required />
          </div>
          <div class="form-group" style="margin-bottom:15px;">
            <label for="product-category">Category</label>
            <input type="text" id="product-category" required />
          </div>
          <div class="form-group" style="margin-bottom:15px;">
            <label for="product-quantity">Quantity</label>
            <input type="number" id="product-quantity" required />
          </div>
          <div class="form-group" style="margin-bottom:20px;">
            <label for="product-price">Price</label>
            <input type="number" step="0.01" id="product-price" required />
          </div>
          <div style="display:flex; justify-content:flex-end; gap:10px;">
            <a href="inventory.html" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Product</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script src="js/theme.js"></script>
<script src="js/inventory.js"></script>
<script>
    document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
</script>
<script src="js/ai-chat.js"></script>`n</body>
</html>
